<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">💼</div>
        <div>
          <h1>Expense Tracker</h1>
          <p>Offline expense workbook for modern budgeting.</p>
        </div>
      </div>

      <div class="top-actions">
        <button class="btn btn-secondary" id="newFileBtn">New File</button>
        <button class="btn btn-secondary" id="openFileBtn">Open File</button>
        <button class="btn btn-primary" id="saveFileBtn">Save File</button>
        <button class="btn btn-secondary" id="themeToggleBtn">Toggle Theme</button>
      </div>
    </header>

    <main>
      <section class="dashboard-grid" aria-label="Summary dashboard">
        <article class="card">
          <p class="card-label">Total Spent</p>
          <h2 id="totalAmount">$0.00</h2>
        </article>
        <article class="card">
          <p class="card-label">Monthly Total</p>
          <h2 id="monthlyAmount">$0.00</h2>
        </article>
        <article class="card">
          <p class="card-label">Category Summary</p>
          <div class="category-summary" id="categorySummary"></div>
        </article>
      </section>

      <section class="panel">
        <div class="form-panel">
          <h2>Add / Edit Expense</h2>
          <form id="expenseForm">
            <div class="form-row">
              <label for="expenseName">Name</label>
              <input type="text" id="expenseName" name="name" placeholder="Coffee, Taxi, Rent" required />
            </div>

            <div class="form-row">
              <label for="expenseAmount">Amount</label>
              <input type="number" id="expenseAmount" name="amount" placeholder="0.00" min="0" step="0.01" required />
            </div>

            <div class="form-row">
              <label for="expenseCategory">Category</label>
              <select id="expenseCategory" name="category" required>
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Bills">Bills</option>
                <option value="Shopping">Shopping</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="form-row">
              <label for="expenseDate">Date</label>
              <input type="date" id="expenseDate" name="date" required />
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Save Expense</button>
              <button type="reset" class="btn btn-secondary" id="resetFormBtn">Clear</button>
            </div>
          </form>
        </div>

        <div class="filter-panel">
          <div class="filter-row">
            <label for="monthFilter">Month</label>
            <select id="monthFilter">
              <option value="All">All</option>
              <option value="01">Jan</option>
              <option value="02">Feb</option>
              <option value="03">Mar</option>
              <option value="04">Apr</option>
              <option value="05">May</option>
              <option value="06">Jun</option>
              <option value="07">Jul</option>
              <option value="08">Aug</option>
              <option value="09">Sep</option>
              <option value="10">Oct</option>
              <option value="11">Nov</option>
              <option value="12">Dec</option>
            </select>
          </div>

          <div class="filter-row">
            <label for="categoryFilter">Category</label>
            <select id="categoryFilter">
              <option value="All">All</option>
              <option value="Food">Food</option>
              <option value="Travel">Travel</option>
              <option value="Bills">Bills</option>
              <option value="Shopping">Shopping</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="filter-row">
            <label for="searchInput">Search</label>
            <input type="search" id="searchInput" placeholder="Search by name" />
          </div>

          <div class="filter-row">
            <label for="sortSelect">Sort by</label>
            <select id="sortSelect">
              <option value="date_desc">Date (Newest → Oldest)</option>
              <option value="date_asc">Date (Oldest → Newest)</option>
              <option value="name_asc">Name (A → Z)</option>
              <option value="name_desc">Name (Z → A)</option>
              <option value="amount_asc">Amount (Low → High)</option>
              <option value="amount_desc">Amount (High → Low)</option>
            </select>
          </div>

          <div class="filter-note">
            <p>Tip: use the filters to narrow results and organize expenses quickly.</p>
          </div>
        </div>
      </section>

      <section class="table-card">
        <div class="table-header">
          <h2>Expense Log</h2>
          <p id="rowCountLabel">0 items</p>
        </div>
        <div class="table-wrapper">
          <table id="expenseTable">
            <thead>
              <tr>
                <th>Name</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <input type="file" id="fileInput" accept="application/json,text/csv" hidden />
  </div>

  <script src="script.js"></script>
</body>
</html>
